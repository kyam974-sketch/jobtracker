<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4C1D95"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#grad)"/>
  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="110" fill="#C084FC" opacity="0.08"/>
  <!-- J -->
  <text x="118" y="340" 
    font-family="'Georgia', serif" 
    font-weight="700" 
    font-size="240" 
    fill="white"
    opacity="0.95">J</text>
  <!-- T -->
  <text x="258" y="340" 
    font-family="'Georgia', serif" 
    font-weight="700" 
    font-size="240" 
    fill="#C084FC"
    opacity="0.95">T</text>
  <!-- Decorative star top right -->
  <text x="400" y="110" font-size="60" fill="#C084FC" opacity="0.7">✦</text>
  <!-- Decorative dot bottom left -->
  <circle cx="80" cy="430" r="12" fill="#C084FC" opacity="0.5"/>
</svg>
